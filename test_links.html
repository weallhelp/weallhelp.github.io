<!DOCTYPE html>
<html>
<head>
    <title>Test Links</title>
</head>
<body>
    <h2>Testing links.txt access</h2>
    <div id="output"></div>
    <script>
    async function testLinks() {
        const output = document.getElementById('output');
        try {
            // Try multiple possible paths
            const paths = [
                'links/links.txt',
                './links/links.txt',
                '/links/links.txt'
            ];
            
            for (const path of paths) {
                output.innerHTML += `<p>Testing: ${path}...</p>`;
                try {
                    const response = await fetch(path + '?v=' + Date.now());
                    if (response.ok) {
                        const text = await response.text();
                        const lines = text.split('\n').filter(l => l.trim()).length;
                        output.innerHTML += `<p style="color: green;">✅ SUCCESS! Found ${lines} URLs</p>`;
                        output.innerHTML += `<pre>${text.substring(0, 200)}...</pre>`;
                        return;
                    }
                } catch(e) {
                    output.innerHTML += `<p style="color: orange;">❌ Failed: ${e.message}</p>`;
                }
            }
            output.innerHTML += `<p style="color: red;">❌ Could not find links.txt in any location</p>`;
        } catch(e) {
            output.innerHTML = `Error: ${e.message}`;
        }
    }
    testLinks();
    </script>
</body>
</html>
